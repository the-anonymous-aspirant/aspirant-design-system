# Serves the Histoire static build at its real public path
# (/admin/histoire/ — baked into asset URLs via HISTOIRE_BASE at build
# time), so the client-nginx reverse proxy passes requests through
# without prefix rewriting and a local `docker run -p 8080:80` browses
# identically to production. Files live under
# /usr/share/nginx/html/admin/histoire/ to keep plain `root` semantics
# (no alias/try_files quirks). mime.types comes from the stock
# nginx:alpine main config — module scripts break under strict MIME
# checking without it (learned in the #2218 spike).
server {
  listen 80;

  location = / { return 302 /admin/histoire/; }
  location = /admin/histoire { return 302 /admin/histoire/; }

  location /admin/histoire/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /admin/histoire/index.html;
  }
}
